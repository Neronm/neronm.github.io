<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <style>
    body { max-width:800px; margin:0 auto; padding:20px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; line-height:1.6; color:#333; }
    h1,h2,h3 { color:#222; }
    table { border-collapse:collapse; width:100%; margin:15px 0; }
    th,td { border:1px solid #ddd; padding:8px 12px; text-align:left; font-size:14px; }
    th { background:#f5f5f5; }
    a { color:#0366d6; text-decoration:none; }
    a:hover { text-decoration:underline; }
    code { background:#f0f0f0; padding:2px 6px; border-radius:3px; font-size:13px; }
    .post-meta { color:#666; font-size:14px; margin-bottom:20px; }
  </style>
</head>
<body>
  <article>
    <h1>{{ page.title }}</h1>
    <div class="post-meta">{{ page.date | date: "%Y-%m-%d" }}</div>
    {{ content }}
  </article>
</body>
</html>
